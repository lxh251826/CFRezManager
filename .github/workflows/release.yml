name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Publish Windows x64 package
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}"
          $publishDir = "publish/CFRezManager-$version-win-x64"
          $zipDir = "release"
          $zipPath = "$zipDir/CFRezManager-$version-win-x64.zip"

          dotnet publish ./CFRezManager.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:EnableCompressionInSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -o $publishDir

          New-Item -ItemType Directory -Force $zipDir | Out-Null
          Compress-Archive -Path "$publishDir/*" -DestinationPath $zipPath -Force

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "CF Rez Manager ${{ github.ref_name }}"
          files: release/CFRezManager-${{ github.ref_name }}-win-x64.zip
          body: |
            CF Rez Manager ${{ github.ref_name }}

            - 浏览、搜索、导出和重新打包 REZ 资源包
            - 支持中文 / English 语言切换，并记住语言、目录和显示大小
            - 支持鼠标前进后退、右键导出指定项、左键拖动框选
            - 支持列表 / 平铺大小切换、文件信息提示和快速搜索
            - 支持 PNG、JPG、BMP、GIF、TIFF、TGA、DTX 缩略图和预览
            - 支持 ENC / Base64 与常见文本文件预览
            - 支持 LTC 缩略图、文本查看和 LithTech 模型预览，兼容 CrossFire 常见 LTC 外层 XOR
            - 支持 LithTech / LTB 模型缩略图和独立模型预览窗口
            - 支持 LithTech world DAT 地图缩略图和独立模型预览，兼容大型 LZMA 压缩地图
            - 支持 CrossFire DAT 对象文本预览，包括 Zoneman、EnvSound、MovePath 和 CameraAnimation
            - 改进 DTX / TGA 解码，兼容 CF 常见 LZMA 压缩纹理和部分异常 TGA 数据
