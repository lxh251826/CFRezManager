name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Publish Windows x64 package
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}"
          $publishDir = "publish/CFRezManager-$version-win-x64"
          $zipDir = "release"
          $zipPath = "$zipDir/CFRezManager-$version-win-x64.zip"

          dotnet publish ./CFRezManager.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:EnableCompressionInSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -o $publishDir

          New-Item -ItemType Directory -Force $zipDir | Out-Null
          Compress-Archive -Path "$publishDir/*" -DestinationPath $zipPath -Force

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "CF Rez Manager ${{ github.ref_name }}"
          files: release/CFRezManager-${{ github.ref_name }}-win-x64.zip
          body: |
            CF Rez Manager ${{ github.ref_name }}

            ## v1.2.2 更新 / Highlights

            - 修复更多暗色主题残留白底控件，包括右键菜单、选择项、输入框、下拉项和进度/滑块。
            - OBJ 导出现在会生成可直接导入的模型包：`.obj` 引用 `.mtl`，`.mtl` 通过 `map_Kd` 指向 `_textures` 下导出的 PNG 贴图。
            - 优化 OBJ 贴图解析：建立全局贴图索引、模型贴图 CFG 索引和路径启发式，避免 UI 脚本与无关贴图目录拖慢导出。
            - 新增 CFG 文本解码链路，支持普通文本、LZMA、ENC Base64 和 REZ phase 尝试，并提前识别二进制 RGB 条带型 CFG。
            - 全局贴图索引和 CFG 配置索引按当前资源树缓存，重复导出时不再反复重建大字典。
            - 在 `F:\CrossFile\CrossFileREZBack\7.2.1` 测试中，`ak47` OBJ 导出约 2.8 秒，2 张贴图全部导出，缺失贴图为 0。
            - Fixed additional dark-theme white surfaces, including context menus, selection items, inputs, combo items, progress bars, and sliders.
            - OBJ export now creates a ready-to-import package: `.obj` references `.mtl`, and `.mtl` uses `map_Kd` paths into the exported `_textures` PNG folder.
            - Optimized OBJ texture resolution with global texture indexes, model-texture CFG indexes, and path heuristics so unrelated UI/config resources no longer dominate lookup work.
            - Added a CFG text decode pipeline for plain text, LZMA, ENC Base64, and REZ phase attempts, with early detection for binary RGB-strip CFG files.
            - Cached global texture indexes and CFG config indexes per loaded resource tree so repeated exports avoid rebuilding large dictionaries.
            - On the `F:\CrossFile\CrossFileREZBack\7.2.1` test tree, `ak47` OBJ export completes in about 2.8 seconds with 2 textures exported and 0 missing textures.

            ## 中文说明

            CF Rez Manager 是用于浏览、搜索、解包和重新打包 LithTech / CrossFire `.rez` 资源包的 Windows WPF 工具，也支持直接预览扫描目录中的散文件资源。

            ### 亮点

            - 浏览、搜索、导出和重新打包 LithTech / CrossFire REZ 资源包。
            - 预览 PNG、JPG、BMP、GIF、TIFF、DDS、TGA、DTX、WAV、OGG、MP3、SPR、LTC、DAT、模型和 world 地图资源。
            - 解码 CrossFire 常见 LZMA 压缩 DTX/TGA/DAT/LTC/音频/文本/图片资源。
            - 预览新版 CrossFire BIN 图片，支持 `16 字节头 + Zstandard + BGRA32 像素` 容器和 LZMA 外壳变体，也保留 CF10/XOR 外壳兜底。
            - 导出可识别的 CrossFire 图片 BIN 时自动写出标准 PNG，脚本/配置 BIN 保留原始文件。
            - 预览 DDS DXT 块压缩纹理和常见未压缩 DDS 纹理。
            - 解析 LithTech SPR 动态精灵，并从 REZ 包或本地解包目录加载 DTX 帧自动播放动画。
            - 预览更多 LTB 二进制模型和 LTA world/map 文本资源。
            - 导出 LithTech 模型部件为 OBJ/MTL，同步导出贴图目录并在 MTL 中引用贴图。
            - 预览和导出 FMOD `.bank`，支持内嵌 FSB5 音频播放、缩略图、曲目清单和大型 BANK 递进加载。
            - 解码 CrossFire UI 脚本 BIN 配置表，并支持 BIN 贴图候选参与模型贴图解析。
            - 缓存已生成缩略图，重复浏览未变化资源时可以跳过重复解码和渲染。
            - 支持中文和英文界面切换，并记住语言、目录和视图大小。

            ### v1.1.6 更新

            - 新增 LZMA 外壳包裹新版 BIN 图片容器的解码路径，修复 `lobbynotice.rez` 一类 BIN 图片无法正确显示/导出的问题。
            - 放宽 LZMA-Alone 头识别，兼容更多合法 properties 变体，同时保留最大解码大小保护。
            - 更新中英文说明书和 GitHub Release 文案，版本号提升到 `v1.1.6`，并关闭 #2。

            ### v1.1.5 更新

            - 修正图片 BIN 导出仍保留原始 `.bin` 数据的问题：导出时会探测 CrossFire 图片 BIN，并写出标准 `.png` 文件。
            - UI 脚本或配置类 BIN 不会被误改为图片，仍按原始 `.bin` 导出。
            - 更新中英文说明书和 GitHub Release 文案，版本号提升到 `v1.1.5`。

            ### v1.1.4 更新

            - 新增 CrossFire BIN 图片预览，支持更新后 UI 资源使用的 `16 字节头 + Zstandard + BGRA32 像素` 容器。
            - 保留 CF10/XOR 外壳图片 BIN 的兜底解码路径。
            - 新增 CrossFire UI 脚本 BIN 配置表结构化预览，包括 `WeaponPreview` 条目和 `WeaponModel` 表。
            - 模型贴图引用和 CFG 贴图映射流程现在也会把 BIN 作为贴图候选。
            - 新增缩略图缓存清理按钮，资源格式变化后可以移除旧的缓存预览图。
            - 新版 BIN 图片解码器已用 2,671 个 UI 样本全量验证，2,671 个全部成功生成预览，失败 0 个。
            - 更新中英文说明书和 GitHub Release 文案，版本号提升到 `v1.1.4`，并关闭 #1。

            ### v1.1.3 更新

            - 新增 LithTech 模型 OBJ/MTL 导出，支持同组模型部件合并、贴图复制/报告生成，以及 Blender 导入所需的映射候选报告。
            - 新增 CFG 贴图索引和扫描流程，可用可读 CFG 建立模型到贴图的关联，并批量输出贴图引用报告。
            - 新增 CFG 失败解码分类：二进制 RGB 条带型 CFG 现在可生成缩略图/预览，高熵启动器/保护组件配置会与模型材质 CFG 分开标记。
            - 改进 CrossFire LTA/LTB/LTC/DAT 模型的贴图加载、预览和导出流程。
            - 更新中英文说明书和 GitHub Release 文案，版本号提升到 `v1.1.3`。

            ### v1.1.2 更新

            - 右键菜单新增 `定位到文件`，可从搜索结果或当前列表跳转到选中项所在目录并聚焦目标文件。
            - 右键菜单新增 `复制名称`，支持复制单个选中项名称，或将多个选中项名称按行复制到剪贴板，并增加剪贴板繁忙重试提示。
            - BANK 预览和压缩资源前缀读取改为复用共享 `LzmaAloneDecoder`，统一普通资源与 BANK 的 LZMA 解码、前缀解码和流式解码路径。
            - 更新中英文说明书和 GitHub Release 文案，版本号提升到 `v1.1.2`。

            ### v1.1.1 更新

            - 优化大型 FMOD `.bank` 预览：首条流准备好后即可打开播放器，剩余 FSB5 音频流会在后台递进追加。
            - 为大型压缩 BANK 增加更快的 LZMA 前缀解码路径，减少音频预览弹出前的等待。
            - 模型缩略图增加几何降采样，大型 DAT/LTB/LTA/LTC 模型会用受控网格生成缩略图，避免每次绘制全部三角面。
            - 新增缩略图磁盘缓存，使用源文件或 REZ 内部文件元数据作为缓存键，未变化资源可以跨目录重扫复用上次生成的预览图。
            - 优化音频曲目列表样式、加载状态显示、点击即播行为和深色滚动条颜色。

            ### v1.1.0 更新

            - 新增 FMOD `.bank` 支持：可解开常见 LZMA 外壳，预览 RIFF/FEV 元数据和内嵌 FSB5 块，并通过右键 `解码 BANK...` 导出 decoded bank 与原始 FSB5 文件。
            - `.bank` 内含音频时会优先走内置 Fmod5Sharp 解码路径，支持 Vorbis、PCM、FADPCM 等常见 FSB5 流；不支持的流再尝试 `vgmstream-cli.exe` 兜底。
            - `.bank` 音频缩略图复用普通音频波形样式，双击可打开播放器，并在播放器右侧显示曲目清单，方便在几百条内部音频流之间快速切换。
            - 音频播放器增加曲目列表、保存音量和循环模式，并修正列表切换时的白底闪烁和控制栏不贴底问题。
            - 模型预览增加纹理路径、UV 坐标和本地/REZ 内贴图解析能力，带贴图的 LTB/LTA/world 模型可以显示更接近原始资源的外观。

            ### v1.0.0 正式版

            - 发布首个正式版，整理当前 REZ 浏览、搜索、解包、重新打包和多格式预览能力。
            - SPR 缩略图优先使用真实 DTX 帧，双击预览支持动画播放、上一项/下一项导航和帧选择。
            - 本地散文件 SPR 可以从相邻资源树查找 DTX 帧，方便检查已解包资源。
            - 图片/SPR 预览窗口的按钮、播放状态和帧名称支持中英文同步刷新。
            - 音频预览窗口改为无系统标题栏样式，并优化频谱峰值下落动画。
            - 加入应用图标，更新中英文说明书，并让 GitHub Release 文案保持中英文双语。

            ## English

            CF Rez Manager is a Windows WPF tool for browsing, searching, extracting, and repacking LithTech / CrossFire `.rez` archives. It can also preview loose resource files in scanned folders.

            ### Highlights

            - Browse, search, extract, and repack LithTech / CrossFire REZ archives.
            - Preview PNG, JPG, BMP, GIF, TIFF, DDS, TGA, DTX, WAV, OGG, MP3, SPR, LTC, DAT, model, and world resources.
            - Decode common CrossFire LZMA-compressed DTX/TGA/DAT/LTC/audio/text/image resources.
            - Preview newer CrossFire BIN images using the `16-byte header + Zstandard + BGRA32 pixels` container, including LZMA-wrapped variants, with the CF10/XOR image wrapper kept as a fallback.
            - Export recognized CrossFire image BIN files as standard PNG files, while script/configuration BIN files keep their original data.
            - Preview DDS DXT block-compressed textures and common uncompressed DDS textures.
            - Parse LithTech SPR sprites and preview animations by loading referenced DTX frames from REZ archives or local extracted folders.
            - Preview more LTB binary models and LTA world/map text files.
            - Export LithTech model parts to OBJ/MTL with a sibling texture folder referenced by the MTL.
            - Preview and export FMOD `.bank` files with embedded FSB5 audio playback, thumbnails, a track list, and progressive loading for large banks.
            - Decode CrossFire UI script BIN configuration tables and use BIN files as model texture candidates.
            - Cache generated thumbnails so unchanged resources can skip repeat decoding and rendering.
            - Switch between Chinese and English UI text, with remembered language, folders, and view size.

            ### v1.1.6 Changes

            - Added a decode path for LZMA-wrapped newer BIN image containers, fixing BIN images such as those in `lobbynotice.rez` not displaying or exporting correctly.
            - Relaxed LZMA-Alone header detection for additional valid properties variants while keeping maximum decoded-size protection.
            - Updated Chinese and English documentation plus GitHub Release notes, bumped the application version to `v1.1.6`, and closes #2.

            ### v1.1.5 Changes

            - Fixed image BIN extraction exporting the original `.bin` data: supported CrossFire image BIN files are now detected and written as standard `.png` files.
            - UI script or configuration BIN files are not treated as images and still export as the original `.bin`.
            - Updated Chinese and English documentation plus GitHub Release notes, and bumped the application version to `v1.1.5`.

            ### v1.1.4 Changes

            - Added CrossFire BIN image preview support for the newer `16-byte header + Zstandard + BGRA32 pixels` container used by updated UI assets.
            - Kept BIN image fallback support for CF10/XOR-wrapped image payloads.
            - Added structured previews for CrossFire UI script BIN configuration tables, including `WeaponPreview` entries and `WeaponModel` tables.
            - Added BIN texture lookup support for model texture references and CFG texture mapping workflows.
            - Added a thumbnail cache clear command so stale cached previews can be removed after resource format changes.
            - Validated the new BIN image decoder against 2,671 UI samples with 2,671 successful preview decodes and 0 failures.
            - Updated Chinese and English documentation plus GitHub Release notes, bumped the application version to `v1.1.4`, and closes #1.

            ### v1.1.3 Changes

            - Added OBJ/MTL export for LithTech model resources, including sibling-part grouping, texture copy/report generation, and mapping-candidate reports for Blender import workflows.
            - Added a CFG texture index and scanner so readable CFG files can drive model-to-texture resolution and produce bulk texture-reference reports.
            - Added CFG failed-decode classification: binary RGB-strip CFGs now show thumbnails/previews, and high-entropy launcher/protection configs are separated from model material CFGs.
            - Improved model texture loading and model preview/export behavior for CrossFire LTA/LTB/LTC/DAT assets.
            - Updated Chinese and English documentation plus GitHub Release notes, and bumped the application version to `v1.1.3`.

            ### v1.1.2 Changes

            - Added a right-click `Locate File` command that jumps from search results or the current list to the selected item's containing folder and focuses the target file.
            - Added a right-click `Copy Name` command for copying one selected item name or multiple selected item names as separate lines, with retry feedback when the clipboard is busy.
            - Switched BANK previews and compressed-resource prefix reads to the shared `LzmaAloneDecoder`, unifying normal resource and BANK LZMA decode, prefix decode, and streaming decode paths.
            - Updated Chinese and English documentation plus GitHub Release notes, and bumped the application version to `v1.1.2`.

            ### v1.1.1 Changes

            - Optimized large FMOD `.bank` previews: the player can open after the first stream is ready, while the remaining FSB5 streams are appended progressively in the background.
            - Added a faster BANK LZMA prefix decode path for huge compressed banks, reducing the wait before audio preview appears.
            - Added model-thumbnail geometry reduction so very large DAT/LTB/LTA/LTC model thumbnails render with a bounded mesh size instead of drawing every triangle.
            - Added disk caching for generated thumbnails, keyed by source file/archive metadata, so unchanged resources can reuse previous preview images across folder rescans.
            - Improved audio track list styling, loading state display, click-to-play behavior, and scrollbar colors for the dark player UI.

            ### v1.1.0 Changes

            - Added FMOD `.bank` support: common LZMA wrappers can be decoded, RIFF/FEV metadata and embedded FSB5 blocks are listed, and `Decode BANK...` exports the decoded bank plus raw FSB5 files.
            - BANK audio preview now uses the built-in Fmod5Sharp path first for common Vorbis, PCM, and FADPCM FSB5 streams, with `vgmstream-cli.exe` kept as a fallback for unsupported codecs.
            - BANK files with playable streams now show audio-style thumbnails and open in the audio player; the player includes a right-side track list for quickly switching across large multi-stream banks.
            - The audio player now has a track list, remembers volume/repeat mode, and fixes the list white-flash and bottom control bar layout issues.
            - Model preview gained texture path, UV coordinate, and local/REZ texture resolution support, so textured LTB/LTA/world models can render closer to the original assets.

            ### v1.0.0 Official Release

            - Shipped the first official release, stabilizing the current REZ browsing, search, extraction, repacking, and multi-format preview feature set.
            - SPR thumbnails prefer real DTX frame images, and double-click previews support animation playback, previous/next navigation, and frame selection.
            - Local loose SPR files can find DTX frames in neighboring resource trees, making extracted assets easier to inspect.
            - Image/SPR preview controls, play state text, and frame names refresh with the selected Chinese/English language.
            - Audio preview now uses a borderless window style and refined spectrum peak falloff.
            - Added the application icon, refreshed Chinese and English documentation, and made GitHub Release notes bilingual.
