name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Publish Windows x64 package
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}"
          $publishDir = "publish/CFRezManager-$version-win-x64"
          $zipDir = "release"
          $zipPath = "$zipDir/CFRezManager-$version-win-x64.zip"

          dotnet publish ./CFRezManager.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:EnableCompressionInSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -o $publishDir

          New-Item -ItemType Directory -Force $zipDir | Out-Null
          Compress-Archive -Path "$publishDir/*" -DestinationPath $zipPath -Force

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "CF Rez Manager ${{ github.ref_name }}"
          files: release/CFRezManager-${{ github.ref_name }}-win-x64.zip
          body: |
            CF Rez Manager ${{ github.ref_name }}

            ## Highlights

            - Browse, search, extract, and repack LithTech / CrossFire REZ archives.
            - Preview PNG, JPG, BMP, GIF, TIFF, DDS, TGA, DTX, WAV, OGG, MP3, LTC, DAT, model, and world resources.
            - Decode common CrossFire LZMA-compressed DTX/TGA/DAT/LTC/audio/text resources.
            - Parse LithTech SPR files and preview sprite animations by loading referenced DTX frames.
            - Preview more LTB binary models and LTA world/map text files.
            - Switch between Chinese and English UI text, with remembered language, folders, and view size.

            ## v0.10.0

            - Added loose-file browsing support so supported resources outside REZ archives can be previewed directly.
            - Added WAV, OGG, and MP3 audio metadata parsing, waveform thumbnails, previous/next audio navigation, and a PotPlayer-style audio preview window.
            - Added OGG playback conversion through NVorbis and MP3 spectrum analysis through NAudio/MediaFoundation.
            - Optimized the audio spectrum renderer with a WriteableBitmap pixel buffer and improved end-of-playback peak falloff.
            - Added decoded text previews for more CrossFire resource formats, including CFT/FCF/FXF/FXO/NAV/APF/REF and WAVE header data.
            - Refreshed Chinese and English documentation.
