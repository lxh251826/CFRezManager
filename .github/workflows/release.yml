name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Publish Windows x64 package
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}"
          $publishDir = "publish/CFRezManager-$version-win-x64"
          $zipDir = "release"
          $zipPath = "$zipDir/CFRezManager-$version-win-x64.zip"

          dotnet publish ./CFRezManager.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:EnableCompressionInSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -o $publishDir

          New-Item -ItemType Directory -Force $zipDir | Out-Null
          Compress-Archive -Path "$publishDir/*" -DestinationPath $zipPath -Force

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "CF Rez Manager ${{ github.ref_name }}"
          files: release/CFRezManager-${{ github.ref_name }}-win-x64.zip
          body: |
            CF Rez Manager ${{ github.ref_name }}

            ## Highlights

            - Browse, search, extract, and repack LithTech / CrossFire REZ archives.
            - Preview PNG, JPG, BMP, GIF, TIFF, DDS, TGA, DTX, WAV, OGG, MP3, LTC, DAT, model, and world resources.
            - Decode common CrossFire LZMA-compressed DTX/TGA/DAT/LTC/audio/text/image resources.
            - Preview DDS DXT block-compressed textures and common uncompressed DDS textures.
            - Parse LithTech SPR files and preview sprite animations by loading referenced DTX frames.
            - Preview more LTB binary models and LTA world/map text files.
            - Switch between Chinese and English UI text, with remembered language, folders, and view size.

            ## v0.11.0

            - Added DDS thumbnails and original-size preview support for DXT1/DXT3/DXT5 block-compressed textures and common uncompressed RGB, RGBA, and luminance textures.
            - Improved DDS texture parsing for mipmap and cubemap byte ranges, with thumbnail scaling to reduce memory use.
            - Added LZMA-compressed preview paths for common raster image resources, with clearer RAW/LZMA/DXT badges and hover metadata.
            - Made standalone preview-tool and model/LTC error messages follow the saved Chinese/English language setting.
            - Switched model-preview free-look movement to WPF render-frame updates for smoother movement and cleaner shutdown cleanup.
            - Refreshed Chinese and English documentation and added the support QR code.
