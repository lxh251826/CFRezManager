name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Publish Windows x64 package
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}"
          $publishDir = "publish/CFRezManager-$version-win-x64"
          $zipDir = "release"
          $zipPath = "$zipDir/CFRezManager-$version-win-x64.zip"

          dotnet publish ./CFRezManager.csproj `
            -c Release `
            -r win-x64 `
            --self-contained true `
            -p:PublishSingleFile=true `
            -p:EnableCompressionInSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -o $publishDir

          New-Item -ItemType Directory -Force $zipDir | Out-Null
          Compress-Archive -Path "$publishDir/*" -DestinationPath $zipPath -Force

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "CF Rez Manager ${{ github.ref_name }}"
          files: release/CFRezManager-${{ github.ref_name }}-win-x64.zip
          body: |
            CF Rez Manager ${{ github.ref_name }}

            ## Highlights

            - Browse, search, extract, and repack LithTech / CrossFire REZ archives.
            - Preview PNG, JPG, BMP, GIF, TIFF, DDS, TGA, DTX, LTC, DAT, model, and world resources.
            - Decode common CrossFire LZMA-compressed DTX/TGA/DAT/LTC resources.
            - Parse LithTech SPR files and preview sprite animations by loading referenced DTX frames.
            - Switch between Chinese and English UI text, with remembered language, folders, and view size.

            ## v0.8.0

            - Added SPR animation preview with frame-rate playback, pause/resume, and manual frame selection.
            - Added LZMA-compressed and uncompressed LithTech SPR parsing.
            - Added fallback SPR frame-table text preview when referenced DTX frames are unavailable.
            - Refreshed Chinese and English documentation.
